name: boi-messaging-auto-context
description: >
  Watches files referenced by running specs. When a watched file is
  modified externally, sends a CONTEXT_UPDATE message to the worker
  with the diff of changes. Uses inotifywait for efficient file
  watching (no polling).

provides:
  events:
    - boi.messaging.context_injected
    - boi.file.changed

requires:
  events:
    - boi.spec.running

rules:
  - name: start-file-watch-on-spec-running
    trigger:
      event: boi.spec.running
    actions:
      - type: shell
        command: >
          python3 -c "
          import json, os, re, sys

          spec_path = '{{ event.spec_path }}'
          spec_id = '{{ event.spec_id }}'

          with open(spec_path) as f:
              content = f.read()

          paths = set()
          for match in re.finditer(r'[/~][\w/._-]+\.\w+', content):
              path = match.group().replace('~', os.path.expanduser('~'))
              if os.path.isfile(path) and path != spec_path:
                  paths.add(path)

          if not paths:
              sys.exit(1)

          manifest_dir = os.path.expanduser('~/.boi/watches')
          os.makedirs(manifest_dir, exist_ok=True)
          manifest = os.path.join(manifest_dir, f'{spec_id}.json')
          with open(manifest, 'w') as f:
              json.dump({'spec_id': spec_id, 'files': sorted(paths)}, f, indent=2)

          print(json.dumps({'spec_id': spec_id, 'watched_files': len(paths)}))
          "

  - name: inject-context-on-file-change
    trigger:
      event: boi.file.changed
    conditions:
      - type: shell
        command: >
          python3 -c "
          import json, os, sys, glob

          changed_file = '{{ event.file_path }}'
          manifest_dir = os.path.expanduser('~/.boi/watches')

          for manifest_path in glob.glob(os.path.join(manifest_dir, '*.json')):
              with open(manifest_path) as f:
                  manifest = json.load(f)
              if changed_file in manifest.get('files', []):
                  print(json.dumps({
                      'spec_id': manifest['spec_id'],
                      'changed_file': changed_file
                  }))
                  sys.exit(0)
          sys.exit(1)
          "
    actions:
      - type: shell
        command: >
          python3 -c "
          import json, os, sys
          sys.path.insert(0, os.path.expanduser('~/boi'))
          from lib.messaging import send_message

          info = json.loads('{{ condition.stdout }}')
          changed_file = info['changed_file']

          import subprocess
          try:
              diff = subprocess.check_output(
                  ['sl', 'diff', '--', changed_file],
                  cwd=os.path.dirname(changed_file),
                  text=True, timeout=5
              ).strip()
          except Exception:
              diff = f'File modified: {changed_file} (diff unavailable)'

          if not diff:
              diff = f'File modified: {changed_file} (no diff detected)'

          context = f'External file change detected:\n\nFile: {changed_file}\n\n{diff}'

          send_message(
              spec_id=info['spec_id'],
              msg_type='CONTEXT_UPDATE',
              payload={'context': context, 'file_path': changed_file},
              sender='hex-events',
              state_dir=os.path.expanduser('~/.boi'),
          )
          print(f'Context injected for {info[\"spec_id\"]} (file: {changed_file})')
          "
        on_success:
          - type: emit
            event: boi.messaging.context_injected
            payload:
              spec_id: "{{ condition.stdout | json_extract('spec_id') }}"
              changed_file: "{{ condition.stdout | json_extract('changed_file') }}"
