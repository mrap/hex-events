name: boi-messaging-chain-context
description: >
  When a spec completes, check if any running or queued specs share
  related topics (defined via chain configuration). If so, send a
  CONTEXT_UPDATE with the completed spec's key findings to the related
  spec's active or next worker.

provides:
  events:
    - boi.messaging.chain_context

requires:
  events:
    - boi.spec.completed

config:
  chains_file: ~/.boi/config/context-chains.json

rules:
  - name: forward-context-on-completion
    trigger:
      event: boi.spec.completed
    actions:
      - type: shell
        command: >
          python3 -c "
          import json, os, re, sys
          sys.path.insert(0, os.path.expanduser('~/boi'))
          from lib.messaging import send_message
          from lib.db import Database

          completed_spec = '{{ event.spec_id }}'
          spec_path = '{{ event.spec_path }}'

          chains_file = os.path.expanduser('~/.boi/config/context-chains.json')
          if not os.path.exists(chains_file):
              sys.exit(1)

          with open(chains_file) as f:
              chains = json.load(f)

          targets = []
          for chain in chains.get('chains', []):
              if completed_spec in chain.get('sources', []):
                  targets.extend(chain.get('targets', []))

          if not targets:
              sys.exit(1)

          with open(spec_path) as f:
              spec_content = f.read()

          discoveries = re.findall(r'## Discovery.*?(?=\n## |\Z)', spec_content, re.DOTALL)
          done_tasks = re.findall(r'### (t-\d+: [^\n]+)\nDONE', spec_content)

          context_lines = [f'Findings from completed spec {completed_spec}:']
          if done_tasks:
              context_lines.append('\nCompleted tasks:')
              for task in done_tasks:
                  context_lines.append(f'  - {task}')
          if discoveries:
              context_lines.append('\nKey discoveries:')
              for d in discoveries[:3]:
                  context_lines.append(d[:500])

          context = '\n'.join(context_lines)

          db = Database(os.path.expanduser('~/.boi/boi.db'))
          all_specs = db.list_specs()
          forwarded = []
          for target_id in targets:
              entry = next((e for e in all_specs if e.get('queue_id') == target_id), None)
              if not entry:
                  continue
              if entry.get('status') in ('running', 'queued', 'requeued'):
                  send_message(
                      spec_id=target_id,
                      msg_type='CONTEXT_UPDATE',
                      payload={
                          'context': context,
                          'source_spec': completed_spec,
                          'chain_forwarded': True
                      },
                      sender='hex-events',
                      state_dir=os.path.expanduser('~/.boi'),
                  )
                  forwarded.append(target_id)

          if forwarded:
              print(json.dumps({
                  'source': completed_spec,
                  'forwarded_to': forwarded,
                  'context_length': len(context)
              }))
          else:
              sys.exit(1)
          "
        on_success:
          - type: emit
            event: boi.messaging.chain_context
            payload:
              source_spec: "{{ event.spec_id }}"
              forwarded_to: "{{ action.stdout }}"

  - name: register-chain-on-dispatch
    trigger:
      event: boi.spec.dispatched
    conditions:
      - type: shell
        command: >
          test -n "{{ event.chain_targets | default('') }}"
    actions:
      - type: shell
        command: >
          python3 -c "
          import json, os

          chains_file = os.path.expanduser('~/.boi/config/context-chains.json')
          os.makedirs(os.path.dirname(chains_file), exist_ok=True)

          chains = {'chains': []}
          if os.path.exists(chains_file):
              with open(chains_file) as f:
                  chains = json.load(f)

          chains['chains'].append({
              'sources': ['{{ event.spec_id }}'],
              'targets': {{ event.chain_targets | default('[]') }}
          })

          tmp = chains_file + '.tmp'
          with open(tmp, 'w') as f:
              json.dump(chains, f, indent=2)
          os.rename(tmp, chains_file)
          "
