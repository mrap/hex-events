name: surface-priorities-on-startup
description: >
  Surface top-ranked improvement priorities at session start.
  Reads priority-ranked.yaml and prints the top entries so the agent
  knows what improvements are most valuable to work on.

requires:
  events:
    - session.started

rules:
  - name: surface-priorities-on-startup
    trigger:
      event: session.started
    actions:
      - type: shell
        command: |
          if [ -f $AGENT_DIR/evolution/priority-ranked.yaml ]; then
            echo "[Priority Scoring] Top improvements:"
            head -30 $AGENT_DIR/evolution/priority-ranked.yaml
          fi
