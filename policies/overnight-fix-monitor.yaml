name: overnight-fix-monitor
description: >
  Monitor the three code review fix specs (q-337, q-338, q-339) overnight.
  On completion: log success. On failure: log failure with details.
  Persistent — fires for each spec independently.
max_fires: 6

requires:
  events:
    - boi.spec.completed
    - boi.spec.failed

provides:
  events:
    - overnight.fix.completed
    - overnight.fix.failed

rules:
  - name: fix-spec-completed
    ttl: 12h
    trigger:
      event: boi.spec.completed
    conditions:
      - field: spec_id
        op: regex
        value: "^q-(337|338|339)$"
    actions:
      - type: shell
        command: >
          echo "[$(date '+%Y-%m-%d %H:%M')] ✓ {{ event.spec_id }} completed ({{ event.tasks_done }}/{{ event.tasks_total }} tasks)"
          >> /Users/mrap/mrap-hex/raw/captures/overnight-monitor-2026-03-28.log
      - type: emit
        event: overnight.fix.completed
        payload:
          spec_id: "{{ event.spec_id }}"
          tasks_done: "{{ event.tasks_done }}"

  - name: fix-spec-failed
    ttl: 12h
    trigger:
      event: boi.spec.failed
    conditions:
      - field: spec_id
        op: regex
        value: "^q-(337|338|339)$"
    actions:
      - type: shell
        command: >
          echo "[$(date '+%Y-%m-%d %H:%M')] ✗ {{ event.spec_id }} FAILED ({{ event.tasks_done }}/{{ event.tasks_total }} tasks)"
          >> /Users/mrap/mrap-hex/raw/captures/overnight-monitor-2026-03-28.log
      - type: emit
        event: overnight.fix.failed
        payload:
          spec_id: "{{ event.spec_id }}"
