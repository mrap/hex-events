name: boi-auto-recovery
description: >
  Automatically investigate and recover failed BOI specs. Handles max iteration
  exhaustion, consecutive crashes, and death loops. Shell-based diagnosis with
  Claude investigation agent for ambiguous cases. Max 2 recovery attempts per spec.
standing_orders: []
reflection_ids: []
provides:
  events:
    - boi.spec.recovered
    - boi.spec.recovery_failed
requires:
  events:
    - boi.spec.failed
    - boi.spec.death_loop
rate_limit:
  max_fires: 6
  window: 1h
rules:
  - name: recover-failed-spec
    trigger:
      event: boi.spec.failed
    conditions:
      - field: recovery_attempts
        op: lt
        value: 2
    actions:
      - type: shell
        command: bash ~/.hex-events/scripts/boi-auto-recover.sh "{{ event.queue_id }}" "{{ event.failure_category }}"
        timeout: 300
        retries: 0

  - name: recover-death-loop
    trigger:
      event: boi.spec.death_loop
    conditions: []
    actions:
      - type: shell
        command: bash ~/.hex-events/scripts/boi-auto-recover.sh "{{ event.queue_id }}" "death_loop"
        timeout: 300
        retries: 0
