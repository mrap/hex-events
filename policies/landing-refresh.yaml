name: landing-refresh
description: Refreshes the landings dashboard when any landings file is modified.
standing_orders: []
reflection_ids: []
provides:
  events: []
requires:
  events:
    - file.modified
rules:
  - name: refresh-dashboard
    trigger:
      event: file.modified
    conditions:
      - field: path
        op: contains
        value: landings/
    actions:
      - type: shell
        command: bash /Users/mrap/hex/.claude/scripts/landings-dashboard.sh --refresh 2>/dev/null || true
