name: morning-briefing
description: >
  Daily morning briefing at ~8am. Summarizes overnight activity,
  today's calendar, and priorities. Rate-limited to once per 20h;
  hour check (7–9am) is enforced inside the shell command.
standing_orders: []
reflection_ids: []
requires:
  events:
    - timer.tick.1h

provides:
  events:
    - briefing.delivered

rate_limit:
  max_fires: 1
  window: 20h

rules:
  - name: morning-briefing
    trigger:
      event: timer.tick.1h
    conditions:
      - field: "count(briefing.delivered, 20h)"
        op: eq
        value: 0
    actions:
      - type: shell
        command: |
          HOUR=$(date +%H | sed 's/^0//')
          if [ "${HOUR:-0}" -lt 7 ] || [ "${HOUR:-0}" -gt 9 ]; then
            exit 0
          fi
          AGENT_DIR=/Users/mrap/mrap-hex bash ~/.hex-events/scripts/morning-briefing.sh
        on_success:
          - type: notify
            message: "{{ action.stdout }}"
          - type: emit
            event: briefing.delivered
            payload:
              date: "{{ now.date }}"
