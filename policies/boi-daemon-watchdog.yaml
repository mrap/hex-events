name: boi-daemon-watchdog
description: >
  External watchdog for the BOI daemon. Runs every 5 minutes.
  Reads ~/.boi/heartbeat.json (written by the health monitor inside the daemon).
  If the heartbeat is stale (>120s): checks if the daemon PID is alive,
  restarts it via launchctl if dead, emits hex.boi.daemon.* events, and
  posts a diagnosis to #from-mrap-hex. Catches daemon crashes that the
  in-process health monitor cannot detect.

requires:
  events:
    - timer.tick.5m

rules:
  - name: check-boi-heartbeat
    trigger:
      event: timer.tick.5m
    actions:
      - type: shell
        command: |
          python3 - <<'PYEOF'
          import json
          import os
          import subprocess
          import sys
          import time
          from datetime import datetime, timezone
          from pathlib import Path

          BOI_DIR = Path.home() / ".boi"
          HEARTBEAT = BOI_DIR / "heartbeat.json"
          HEX_EMIT = Path.home() / ".hex-events" / "hex_emit.py"
          PLIST_LABEL = "com.hex.boi-daemon"
          PLIST_PATH = Path.home() / "Library" / "LaunchAgents" / f"{PLIST_LABEL}.plist"
          STALE_THRESHOLD = 120  # seconds

          def emit(event_type, payload=None):
              if not HEX_EMIT.exists():
                  return
              try:
                  subprocess.run(
                      ["python3", str(HEX_EMIT), event_type,
                       json.dumps(payload or {}), "boi:daemon-watchdog"],
                      timeout=10, capture_output=True,
                  )
              except Exception as e:
                  print(f"[boi-watchdog] emit failed: {e}", file=sys.stderr)

          def notify_slack(msg):
              try:
                  subprocess.run(
                      ["cc-connect", "send", "--message", msg],
                      timeout=15, capture_output=True,
                  )
              except Exception as e:
                  print(f"[boi-watchdog] Slack notify failed: {e}", file=sys.stderr)

          def pid_alive(pid):
              try:
                  os.kill(int(pid), 0)
                  return True
              except (ProcessLookupError, PermissionError, ValueError):
                  return False

          # ── 1. Heartbeat file missing ─────────────────────────────────
          if not HEARTBEAT.exists():
              emit("hex.boi.daemon.not_running", {
                  "reason": "heartbeat.json missing — daemon not started or newly installed"
              })
              notify_slack(
                  ":warning: BOI daemon watchdog: `~/.boi/heartbeat.json` does not exist. "
                  "Daemon has not run since last install or `heartbeat.json` was removed."
              )
              sys.exit(0)

          # ── 2. Read heartbeat (JSON or plain-text timestamp) ──────────
          raw = HEARTBEAT.read_text().strip()
          pid = None
          ts_str = ""
          specs_active_from_hb = None
          workers_alive_from_hb = None
          try:
              hb = json.loads(raw)
              pid = hb.get("pid")
              ts_str = hb.get("ts", "")
              specs_active_from_hb = hb.get("specs_active")
              workers_alive_from_hb = hb.get("workers_alive")
          except (json.JSONDecodeError, ValueError):
              # Fallback: daemon-heartbeat writes a plain ISO timestamp
              ts_str = raw
              # Try to get PID from daemon.pid
              pid_file = BOI_DIR / "daemon.pid"
              if pid_file.exists():
                  try:
                      pid = int(pid_file.read_text().strip())
                  except (ValueError, OSError):
                      pass

          # ── 3. Calculate heartbeat age ────────────────────────────────
          try:
              ts = datetime.fromisoformat(ts_str.rstrip("Z")).replace(tzinfo=timezone.utc)
              age = (datetime.now(timezone.utc) - ts).total_seconds()
          except (ValueError, TypeError) as e:
              emit("hex.boi.daemon.not_running", {
                  "reason": f"heartbeat timestamp invalid: {ts_str!r}: {e}"
              })
              notify_slack(
                  f":red_circle: BOI daemon watchdog: heartbeat timestamp is invalid: `{ts_str}`. "
                  "Manual check required."
              )
              sys.exit(0)

          # ── 4. Fresh heartbeat — all good ─────────────────────────────
          if age <= STALE_THRESHOLD:
              print(f"[boi-watchdog] OK: heartbeat {age:.0f}s old (pid={pid})")
              sys.exit(0)

          # ── 5. Stale heartbeat — diagnose ────────────────────────────
          print(
              f"[boi-watchdog] STALE: heartbeat is {age:.0f}s old "
              f"(threshold={STALE_THRESHOLD}s, pid={pid})",
              file=sys.stderr,
          )

          specs_active = specs_active_from_hb if specs_active_from_hb is not None else "?"
          workers_alive = workers_alive_from_hb if workers_alive_from_hb is not None else "?"

          if pid and pid_alive(pid):
              # Daemon process is alive but the health thread stopped writing the heartbeat
              emit("hex.boi.daemon.hung", {
                  "pid": pid,
                  "heartbeat_age_s": int(age),
                  "specs_active": specs_active,
                  "workers_alive": workers_alive,
                  "reason": "daemon PID alive but health thread stopped writing heartbeat",
              })
              notify_slack(
                  f":warning: *BOI daemon hung*: PID {pid} is alive but heartbeat "
                  f"is *{int(age)}s stale* (last seen: {specs_active} specs, "
                  f"{workers_alive} workers). Health thread likely died.\n"
                  "Fix: `launchctl unload ~/Library/LaunchAgents/com.hex.boi-daemon.plist"
                  " && launchctl load ~/Library/LaunchAgents/com.hex.boi-daemon.plist`"
              )
          else:
              # Daemon is dead — attempt restart via launchctl
              restarted = False
              restart_error = ""
              try:
                  subprocess.run(
                      ["launchctl", "unload", str(PLIST_PATH)],
                      timeout=10, capture_output=True,
                  )
                  time.sleep(1)
                  r = subprocess.run(
                      ["launchctl", "load", str(PLIST_PATH)],
                      timeout=10, capture_output=True,
                  )
                  restarted = r.returncode == 0
                  if not restarted:
                      restart_error = r.stderr.decode("utf-8", errors="replace").strip()
              except Exception as e:
                  restart_error = str(e)

              if restarted:
                  emit("hex.boi.daemon.restarted", {
                      "pid_was": pid,
                      "heartbeat_age_s": int(age),
                      "action": "launchctl unload+load",
                  })
                  notify_slack(
                      f":arrows_counterclockwise: *BOI daemon restarted*: daemon "
                      f"(last PID {pid}) was dead (heartbeat {int(age)}s stale). "
                      "Successfully restarted via `launchctl load`."
                  )
              else:
                  emit("hex.boi.daemon.restart_failed", {
                      "pid_was": pid,
                      "heartbeat_age_s": int(age),
                      "error": restart_error,
                  })
                  notify_slack(
                      f":red_circle: *BOI daemon dead and restart failed*: daemon "
                      f"(last PID {pid}) is dead (heartbeat {int(age)}s stale) and "
                      f"`launchctl load` failed: `{restart_error or 'unknown error'}`. "
                      "Manual intervention required."
                  )
          PYEOF
        timeout: 30
        on_failure:
          - type: emit
            event: hex.boi.watchdog.failed
            payload:
              reason: "boi-daemon-watchdog script failed unexpectedly"
          - type: shell
            command: >
              cc-connect send --message
              ":red_circle: BOI daemon watchdog script itself failed — check
              ~/.hex-events/daemon.log for details." 2>/dev/null || true
        timeout: 30
