name: polymarket-scanner
description: "Run Polymarket paper trader scanner every 4 hours and daily report at 9 AM"
standing_orders: []
reflection_ids: []
provides:
  events:
    - polymarket.scan.completed
    - polymarket.report.completed
requires:
  events:
    - timer.tick.4h
    - timer.tick.daily.9am
rate_limit:
  max_fires: 10
  window: 1h
rules:
  - name: scan-every-4h
    trigger:
      event: timer.tick.4h
    conditions: []
    actions:
      - type: shell
        command: "cd ~/github.com/mrap/polymarket-trader && bash scripts/scan.sh"
        timeout: 120
        retries: 2
      - type: emit
        event: polymarket.scan.completed

  - name: daily-report
    trigger:
      event: timer.tick.daily.9am
    conditions: []
    actions:
      - type: shell
        command: "cd ~/github.com/mrap/polymarket-trader && bash scripts/report.sh"
        retries: 1
      - type: emit
        event: polymarket.report.completed

  - name: ensure-dashboard
    trigger:
      event: timer.tick.4h
    conditions: []
    actions:
      - type: shell
        command: "pgrep -f 'flask run.*5151' || (cd ~/github.com/mrap/polymarket-trader && nohup bash scripts/dashboard.sh > data/dashboard.log 2>&1 &)"
