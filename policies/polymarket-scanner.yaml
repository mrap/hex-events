name: polymarket-scanner
description: >
  Scans Polymarket for extreme-priced sports markets every 4 hours.
  Fetches top markets by 24h volume (capped at 500 markets / 5 HTTP requests),
  classifies sports markets, generates contrarian signals, and executes paper trades.
  Completes within 120s. Emits polymarket.scan.completed only on success.

requires:
  events:
    - timer.tick.4h

provides:
  events:
    - polymarket.scan.completed

rate_limit:
  max_fires: 8
  window: 24h

rules:
  - name: run-polymarket-scan
    trigger:
      event: timer.tick.4h
    actions:
      - type: shell
        timeout: 300
        retries: 1
        command: |
          cd ~/github.com/mrap/polymarket-trader && bash scripts/scan.sh
        on_success:
          - type: emit
            event: polymarket.scan.completed
            source: "hex:polymarket"
            payload:
              status: success
              triggered_by: timer.tick.4h
