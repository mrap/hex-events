name: notify-jason-q310
description: >
  Oneshot: when q-310 (upgrade path audit) completes successfully,
  text Jason that hex-upgrade now handles Codex setup automatically.
lifecycle: oneshot-delete

requires:
  events:
    - boi.spec.completed

rules:
  - name: text-jason-on-q310-complete
    ttl: 24h
    trigger:
      event: boi.spec.completed
      conditions:
        - field: spec_id
          op: eq
          value: q-310
    actions:
      - type: shell
        command: >
          imsg send --chat-id 6
          --text "Update to my last message — even simpler. Just run /hex-upgrade from your agent. It handles Codex setup automatically now."
